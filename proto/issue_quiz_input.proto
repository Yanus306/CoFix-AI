syntax = "proto3";

package cofix.quiz.v1;

import "proto/issue_quiz_output.proto";

service IssueQuizService {
  rpc GenerateIssueQuiz(GenerateIssueQuizRequest) returns (GenerateIssueQuizResponse);
}

message RecentIssue {
  string dataset = 1;
  string title = 2;
  repeated string learning_directions = 3;
  string code = 4;
  string guide = 5;
}

message GenerateIssueQuizRequest {
  string selected_level = 1;
  int32 problem_count = 2;
  repeated RecentIssue issues = 3;
}
