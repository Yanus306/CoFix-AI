syntax = "proto3";

package cofix.quiz.v1;

message QuizChoice {
  string id = 1;
  string text = 2;
}

message QuizCodeBlock {
  string language = 1;
  string content = 2;
}

message QuizProblem {
  string question = 1;
  optional QuizCodeBlock code_block = 2;
  repeated QuizChoice choices = 3;
  string answer = 4;
  string explanation = 5;
}

message GenerateIssueQuizResponse {
  repeated QuizProblem problems = 1;
}
