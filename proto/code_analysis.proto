syntax = "proto3";

package cofix.analysis.v1;

message CodeIssue {
  string code = 1;
  string label = 2;
  string title = 3;
  string description = 4;
  repeated string learning_directions = 5;
  string dataset = 6;
  string guide = 7;
}

message AnalyzeCodeRequest {
  string user_id = 1;
  string code = 2;
}

message AnalyzeCodeResponse {
  repeated CodeIssue issues = 1;
}

message QuizChoice {
  string id = 1;
  string text = 2;
}

message GenerateIssueQuizRequest {
  CodeIssue issue = 1;
}

message GenerateIssueQuizResponse {
  string question = 1;
  repeated QuizChoice choices = 2;
  string answer = 3;
  string explanation = 4;
}
