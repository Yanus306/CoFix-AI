syntax = "proto3";

package cofix.chatbot.v1;

message MarkdownAnswer {
  string markdown = 1;
}

message ConversationSummaryResult {
  optional string conversation_summary = 1;
}

message ChatStreamResponse {
  oneof payload {
    MarkdownAnswer markdown_answer = 1;
    ConversationSummaryResult summary = 2;
  }
}
