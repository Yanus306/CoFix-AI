syntax = "proto3";

package cofix.chatbot.v1;

import "proto/learning_chat_output.proto";

service LearningChatbotService {
  rpc Chat(ChatRequest) returns (stream ChatStreamResponse);
}

message CategoryCount {
  string dataset = 1;
  int32 count = 2;
}

message RecentIssue {
  string dataset = 1;
  string title = 2;
  repeated string learning_directions = 3;
  string code = 4;
  string guide = 5;
}

message ConversationSummary {
  string turn_id = 1;
  string summary = 2;
}

message ChatRequest {
  reserved 1;
  string message = 2;
  repeated CategoryCount category_counts = 3;
  repeated RecentIssue recent_issues = 4;
  repeated ConversationSummary recent_conversation_summaries = 5;
}
